<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    .t { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .b { font-weight: 700; }
    .green { fill: #50fa7b; }
    .yellow { fill: #f1fa8c; }
    .red { fill: #ff5555; }
    .cyan { fill: #8be9fd; }
    .white { fill: #f8f8f2; }
    .gray { fill: #6272a4; }
    .orange { fill: #ffb86c; }
    .purple { fill: #bd93f9; }
    .pink { fill: #ff79c6; }

    .line { opacity: 0; }
    .line.l1  { animation: appear 0.1s 0.3s forwards; }
    .line.l2  { animation: appear 0.1s 0.8s forwards; }
    .line.l3  { animation: appear 0.1s 1.1s forwards; }
    .line.l4  { animation: appear 0.1s 1.4s forwards; }
    .line.l5  { animation: appear 0.1s 1.7s forwards; }
    .line.l6  { animation: appear 0.1s 2.0s forwards; }
    .line.l7  { animation: appear 0.1s 2.3s forwards; }
    .line.l8  { animation: appear 0.1s 2.6s forwards; }
    .line.l9  { animation: appear 0.1s 2.9s forwards; }
    .line.l10 { animation: appear 0.1s 3.2s forwards; }
    .line.l11 { animation: appear 0.1s 3.5s forwards; }
    .line.l12 { animation: appear 0.1s 3.8s forwards; }
    .line.l13 { animation: appear 0.1s 4.1s forwards; }
    .line.l14 { animation: appear 0.1s 4.4s forwards; }
    .line.l15 { animation: appear 0.1s 4.7s forwards; }
    .line.l16 { animation: appear 0.1s 5.2s forwards; }
    .line.l17 { animation: appear 0.1s 5.5s forwards; }
    .line.l18 { animation: appear 0.1s 6.0s forwards; }

    .cursor { animation: blink 1s step-end infinite; }
    @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <!-- Terminal chrome -->
  <rect width="800" height="600" rx="10" fill="#282a36"/>
  <rect width="800" height="36" rx="10" fill="#21222c"/>
  <rect y="26" width="800" height="10" fill="#21222c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5555"/>
  <circle cx="40" cy="18" r="6" fill="#f1fa8c"/>
  <circle cx="60" cy="18" r="6" fill="#50fa7b"/>
  <text x="400" y="22" text-anchor="middle" class="t gray" font-size="12">claude &mdash; /doctor fix</text>

  <g transform="translate(20, 56)">
    <!-- Command -->
    <g class="line l1">
      <text y="0" class="t purple b">$ /doctor fix</text>
    </g>

    <!-- Findings -->
    <g class="line l2">
      <text y="28" class="t white b">Found 7 issues. Fix all at once?</text>
      <text y="28" x="320" class="t green b"> [Y/n]</text>
    </g>

    <!-- Fix list with severity -->
    <g class="line l3">
      <text y="60" class="t gray">&#9473;&#9473;&#9473; Applying fixes &#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text>
    </g>

    <g class="line l4">
      <text y="86" class="t red b">  &#128308; chmod 600 .env .mcp.json</text>
    </g>
    <g class="line l5">
      <text y="104" class="t gray">     644 &#8594; 600 &#8212; secrets no longer world-readable</text>
    </g>

    <g class="line l6">
      <text y="132" class="t red b">  &#128308; Added *.pem *.key to .gitignore</text>
    </g>
    <g class="line l7">
      <text y="150" class="t gray">     git add . won't push private keys anymore</text>
    </g>

    <g class="line l8">
      <text y="178" class="t orange b">  &#128992; Created .claude/rules/python-async.md</text>
    </g>
    <g class="line l9">
      <text y="196" class="t gray">     Claude knows: no sync I/O, no bare except</text>
    </g>

    <g class="line l10">
      <text y="224" class="t orange b">  &#128992; Created scripts/pre-push.sh</text>
    </g>
    <g class="line l11">
      <text y="242" class="t gray">     Tests run before every push &#8212; broken code stays local</text>
    </g>

    <g class="line l12">
      <text y="270" class="t yellow b">  &#128993; Added episodic-memory plugin</text>
    </g>
    <g class="line l13">
      <text y="288" class="t gray">     Claude remembers decisions across sessions</text>
    </g>

    <g class="line l14">
      <text y="316" class="t yellow b">  &#128993; Created smoke test (import check)</text>
    </g>
    <g class="line l15">
      <text y="334" class="t gray">     5-second sanity check: app loads without errors</text>
    </g>

    <!-- Verification -->
    <g class="line l16">
      <text y="368" class="t gray">&#9473;&#9473;&#9473; Verifying &#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text>
    </g>
    <g class="line l17">
      <text y="394" class="t green">  &#10003; Lint passed</text>
      <text y="412" class="t green">  &#10003; Tests passed (1089/1089)</text>
      <text y="430" class="t green">  &#10003; Hooks executable</text>
    </g>

    <!-- Final score -->
    <g class="line l18">
      <text y="466" class="t white b" font-size="15">Score: </text>
      <text y="466" x="66" class="t yellow b">72%</text>
      <text y="466" x="110" class="t white"> &#8594; </text>
      <text y="466" x="140" class="t green b" font-size="15">89%</text>
      <text y="466" x="185" class="t cyan"> (Growing &#127807;)</text>
      <text y="466" x="370" class="t green b"> &#8212; EXCELLENT</text>
    </g>
  </g>

  <rect x="20" y="562" width="8" height="16" fill="#f8f8f2" class="cursor"/>
</svg>