<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    .t { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .b { font-weight: 700; }
    .green { fill: #50fa7b; }
    .yellow { fill: #f1fa8c; }
    .red { fill: #ff5555; }
    .cyan { fill: #8be9fd; }
    .white { fill: #f8f8f2; }
    .gray { fill: #6272a4; }
    .orange { fill: #ffb86c; }
    .purple { fill: #bd93f9; }
    .pink { fill: #ff79c6; }

    /* Animation: lines appear sequentially */
    .line { opacity: 0; }
    .line.l1  { animation: appear 0.1s 0.3s forwards; }
    .line.l2  { animation: appear 0.1s 0.8s forwards; }
    .line.l3  { animation: appear 0.1s 1.0s forwards; }
    .line.l4  { animation: appear 0.1s 1.2s forwards; }
    .line.l5  { animation: appear 0.1s 1.4s forwards; }
    .line.l6  { animation: appear 0.1s 1.6s forwards; }
    .line.l7  { animation: appear 0.1s 1.8s forwards; }
    .line.l8  { animation: appear 0.1s 2.2s forwards; }
    .line.l9  { animation: appear 0.1s 2.6s forwards; }
    .line.l10 { animation: appear 0.1s 3.0s forwards; }
    .line.l11 { animation: appear 0.1s 3.2s forwards; }
    .line.l12 { animation: appear 0.1s 3.5s forwards; }
    .line.l13 { animation: appear 0.1s 3.8s forwards; }
    .line.l14 { animation: appear 0.1s 4.1s forwards; }
    .line.l15 { animation: appear 0.1s 4.4s forwards; }
    .line.l16 { animation: appear 0.1s 4.7s forwards; }
    .line.l17 { animation: appear 0.1s 5.0s forwards; }
    .line.l18 { animation: appear 0.1s 5.3s forwards; }
    .line.l19 { animation: appear 0.1s 5.6s forwards; }
    .line.l20 { animation: appear 0.1s 5.9s forwards; }
    .line.l21 { animation: appear 0.1s 6.2s forwards; }
    .line.l22 { animation: appear 0.1s 6.5s forwards; }
    .line.l23 { animation: appear 0.1s 7.0s forwards; }

    /* Cursor blink */
    .cursor { animation: blink 1s step-end infinite; }

    @keyframes appear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
  </style>

  <!-- Terminal chrome -->
  <rect width="800" height="620" rx="10" fill="#282a36"/>
  <rect width="800" height="36" rx="10" fill="#21222c"/>
  <rect y="26" width="800" height="10" fill="#21222c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5555"/>
  <circle cx="40" cy="18" r="6" fill="#f1fa8c"/>
  <circle cx="60" cy="18" r="6" fill="#50fa7b"/>
  <text x="400" y="22" text-anchor="middle" class="t gray" font-size="12">claude &mdash; /doctor scan</text>

  <!-- Terminal content -->
  <g transform="translate(20, 56)">
    <!-- Command -->
    <g class="line l1">
      <text y="0" class="t purple b">$ /doctor scan</text>
    </g>

    <!-- Phase 1: Project Profile -->
    <g class="line l2">
      <text y="28" class="t gray">Phase 1: Studying project...</text>
    </g>
    <g class="line l3">
      <text y="52" class="t white b">Project Profile</text>
    </g>
    <g class="line l4">
      <text y="72" class="t cyan">  Stack:        </text>
      <text y="72" x="146" class="t white">Python 3.12 / asyncio / PostgreSQL</text>
    </g>
    <g class="line l5">
      <text y="90" class="t cyan">  Test Runner:  </text>
      <text y="90" x="146" class="t white">pytest, 1089 tests</text>
    </g>
    <g class="line l6">
      <text y="108" class="t cyan">  Linter:       </text>
      <text y="108" x="146" class="t white">ruff check + ruff format</text>
    </g>
    <g class="line l7">
      <text y="126" class="t cyan">  Deploy:       </text>
      <text y="126" x="146" class="t white">Railway (Docker)</text>
    </g>

    <!-- Phase 1.5: Maturity Detection -->
    <g class="line l8">
      <text y="160" class="t gray">Phase 1.5: Detecting maturity...</text>
    </g>
    <g class="line l9">
      <text y="184" class="t white b">MATURITY: </text>
      <text y="184" x="100" class="t green b">Growing</text>
      <text y="184" x="175" class="t white"> &#127807;</text>
    </g>
    <g class="line l10">
      <text y="204" class="t green">  &#10003; Git</text>
      <text y="204" x="100" class="t green">&#10003; Deps</text>
      <text y="204" x="190" class="t green">&#10003; Tests</text>
      <text y="204" x="290" class="t green">&#10003; Linter</text>
      <text y="204" x="395" class="t red">&#10007; CI</text>
      <text y="204" x="460" class="t red">&#10007; CC hooks</text>
    </g>
    <g class="line l11">
      <text y="224" class="t cyan">  Audit profile: 27 checks (core + quality)</text>
    </g>

    <!-- Phase 2: Diagnosis -->
    <g class="line l12">
      <text y="258" class="t gray">Phase 2: Running 27 checks...</text>
    </g>

    <!-- Layer scores -->
    <g class="line l13">
      <text y="286" class="t pink">  Security:      </text>
      <text y="286" x="170" class="t green b">7/8</text>
      <text y="286" x="210" class="t gray"> &#215;30%</text>
      <text y="286" x="270" class="t yellow"> &#8212; permissions</text>
    </g>
    <g class="line l14">
      <text y="308" class="t pink">  Foundation:    </text>
      <text y="308" x="170" class="t green b">4/4</text>
      <text y="308" x="210" class="t gray"> &#215;25%</text>
      <text y="308" x="270" class="t green"> &#10003;</text>
    </g>
    <g class="line l15">
      <text y="330" class="t pink">  Quality:       </text>
      <text y="330" x="170" class="t green b">5/7</text>
      <text y="330" x="210" class="t gray"> &#215;30%</text>
      <text y="330" x="270" class="t yellow"> &#8212; pre-push, coverage</text>
    </g>
    <g class="line l16">
      <text y="352" class="t pink">  Intelligence:  </text>
      <text y="352" x="170" class="t purple b">0/2</text>
      <text y="352" x="210" class="t gray"> &#215;5%</text>
      <text y="352" x="270" class="t purple"> &#8212; bonus</text>
    </g>
    <g class="line l17">
      <text y="374" class="t pink">  Context:       </text>
      <text y="374" x="170" class="t purple b">1/5</text>
      <text y="374" x="210" class="t gray"> &#215;5%</text>
      <text y="374" x="270" class="t purple"> &#8212; bonus</text>
    </g>
    <g class="line l18">
      <text y="396" class="t pink">  DX:            </text>
      <text y="396" x="170" class="t purple b">2/4</text>
      <text y="396" x="210" class="t gray"> &#215;5%</text>
      <text y="396" x="270" class="t purple"> &#8212; bonus</text>
    </g>

    <!-- Weighted Score -->
    <g class="line l19">
      <text y="434" class="t white b" font-size="15">Weighted Score: </text>
      <text y="434" x="166" class="t green b" font-size="15">72%</text>
      <text y="434" x="210" class="t green b"> &#8212; GOOD &#10003;</text>
    </g>

    <!-- TOP-3 -->
    <g class="line l20">
      <text y="466" class="t gray">&#9473;&#9473;&#9473; TOP-3 Priorities &#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text>
    </g>
    <g class="line l21">
      <text y="490" class="t red">  1. &#128308; chmod 600 .env &#8212; secrets world-readable</text>
    </g>
    <g class="line l22">
      <text y="510" class="t orange">  2. &#128992; Add pre-push hook &#8212; broken code reaches git</text>
    </g>
    <g class="line l23">
      <text y="530" class="t yellow">  3. &#128993; Add coverage threshold &#8212; quality invisible</text>
    </g>
  </g>

  <!-- Cursor -->
  <rect x="20" y="598" width="8" height="16" fill="#f8f8f2" class="cursor"/>
</svg>